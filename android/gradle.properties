org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Workaround for Kotlin daemon "Could not close incremental caches" /
# "this and base files have different roots" when Pub cache is on another
# drive than the project (common on Windows: C:\Pub\Cache vs D:\project).
kotlin.incremental=false
